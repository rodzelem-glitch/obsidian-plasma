
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TekTrakker: The All-In-One Operating System for High-Performance Trade Businesses. Dispatch, Invoicing, GPS, and AI Automation in one platform." />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="tiktok-developers-site-verification" content="9FIgfvqfU4wB0j0t4b3hLzW19YviHsju" />
    <title>TekTrakker | Field Service Management & Automation Software</title>
    <link rel="icon" type="image/png" sizes="any" href="/favicon-new.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://tektrakker.firebaseapp.com" crossorigin>
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://apis.google.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --vh: 1vh;
      }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        height: 100vh;
        height: calc(var(--vh, 1vh) * 100);
        overflow-y: auto;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      input, select, textarea, button {
        font-size: 16px !important; /* Prevent iOS Zoom */
      }
      /* Prevent sticky zoom by ensuring no focus outlines cause layout shifts */
      *:focus {
        outline: none !important;
      }
      .leaflet-container {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
    <script>
      const setVh = () => {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      };
      
      const forceViewportReset = () => {
        // Force layout reflow and scroll to top to break "permanent zoom"
        document.body.style.display = 'none';
        document.body.offsetHeight; // trigger reflow
        document.body.style.display = '';
        window.scrollTo(0, 0);
        setVh();
        
        // Reset viewport meta if possible (extra precaution)
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
           viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
        }
      };

      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', () => {
        setTimeout(forceViewportReset, 300);
      });
      setVh();


      if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
          window.location.href = window.location.href.replace('http:', 'https:');
      }
    </script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var leaflet = document.createElement('link');
          leaflet.rel = 'stylesheet';
          leaflet.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
          leaflet.integrity = 'sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=';
          leaflet.crossOrigin = '';
          document.head.appendChild(leaflet);

          var squareScript = document.createElement('script');
          squareScript.src = "https://web.squarecdn.com/v1/square.js";
          squareScript.defer = true;
          document.head.appendChild(squareScript);

          var googleScript = document.createElement('script');
          googleScript.src = "https://accounts.google.com/gsi/client";
          googleScript.async = true;
          googleScript.defer = true;
          document.head.appendChild(googleScript);

          window.fbAsyncInit = function() {
            window.FB.init({
              appId            : '1359071379380800',
              autoLogAppEvents : true,
              xfbml            : true,
              version          : 'v21.0'
            });
          };

          var fbScript = document.createElement('script');
          fbScript.src = "https://connect.facebook.net/en_US/sdk.js";
          fbScript.async = true;
          fbScript.defer = true;
          fbScript.crossOrigin = "anonymous";
          document.head.appendChild(fbScript);
        }, 3500);

        setTimeout(function() {
          var rootElem = document.getElementById('root');
          if (rootElem && rootElem.innerHTML.trim() === '' && window.appHasErrors !== true) {
             document.body.innerHTML = '<div style="padding:40px; background:yellow; color:black; font-family:sans-serif; height:100vh; z-index:99999; position:relative;">' +
               '<h1 style="font-size:30px">JAVASCRIPT FAILED TO EXECUTE</h1>' +
               '<p>The WKWebView loaded the HTML but silently refused to execute the bundled chunk.</p></div>';
          }
        }, 7000);
      });
    </script>
    <script>
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
      } else {
          document.documentElement.classList.remove('dark')
      }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50">
    <div id="root">
      <div class="sr-only" aria-hidden="true">
        <h1>TekTrakker: The All-In-One Operating System for High-Performance Trade Businesses</h1>
        <p>Welcome to TekTrakker, the premier field service management platform.</p>
        <ul>
          <li><a href="https://tekairinc.com" rel="follow">TekAir Inc</a></li>
        </ul>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
